<div class="container">
  <h2>Add Warehouse</h2>
  <form [formGroup]="warehouseForm" (ngSubmit)="addWarehouse()">
    <input formControlName="name" placeholder="Warehouse Name" />
    <input formControlName="location" placeholder="Location" />
    <button type="submit">Add Warehouse</button>
  </form>

  <hr />

  <h2>Add Product</h2>
  <form [formGroup]="productForm" (ngSubmit)="addProduct()">
    <input formControlName="name" placeholder="Product Name" />
    <input formControlName="quantity" type="number" placeholder="Quantity" />
    <select formControlName="warehouseId">
      <option [value]="null" disabled>Select Warehouse</option>
      <option *ngFor="let wh of warehouses" [value]="wh.id">
        {{ wh.name }}
      </option>
    </select>
    <button type="submit">Add Product</button>
  </form>

  <hr />

  <h2>Products</h2>
  <table *ngIf="products.length > 0">
    <thead>
      <tr>
        <th>Name</th>
        <th>Quantity</th>
        <th>Warehouse</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of products">
        <td>{{ p.name }}</td>
        <td>{{ p.quantity }}</td>
        <td>{{ p.warehouse?.name }}</td>
      </tr>
    </tbody>
  </table>
</div>
